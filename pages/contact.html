<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact - CoachFit</title>
  <link rel="stylesheet" href="../assets/css/style.css">
</head>

<body>
  <header>
  </header>
  <main>


    <nav class="navbar-expand">
      <div class="overlay" id="overlay"></div>
      <div class="menu-toggle" id="menu-toggle">☰</div>

      <ul id="nav-links">
        <li><a href="/index.html">Accueil</a></li>
        <li><a href="/pages/services.html">Nos services</a></li>
        <li><a href="pages/contact.html">Prendre rendez-vous</a></li>
        <li><a href="/pages/connexion.html">Se connecter</a></li>
        <li><a href="/pages/contact.html">Nous Contacter</a></li>

      </ul>
    </nav>


    <div>
      <section>
        <h2>contact</h2>
        <form id="contact">
          <textarea name="message" rows="3" placeholder="Votre message..." required></textarea>
          <button type="submit">Envoyer</button>
        </form>
      </section>
    </div>

  </main>

  <footer>
    <p>Politique de confidentialité - Conditions générales d’utilisation</p>
    <p>&copy;2026 Aurora Hair Salon. Tous droits réservés.</p>
  </footer>
  <script>
    const toggle = document.getElementById("menu-toggle");
    const navLinks = document.getElementById("nav-links");
    const overlay = document.getElementById("overlay");

    toggle.addEventListener("click", () => {
      navLinks.classList.toggle("active");
      overlay.classList.toggle("active");
    });

    overlay.addEventListener("click", () => {
      navLinks.classList.remove("active");
      overlay.classList.remove("active");
    });
  </script>

</body>

</html>
