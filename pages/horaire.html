<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aurora - Horaire</title>
    <link rel="stylesheet" href="/assets/css/style.css">

</head>

<body>

    <header>
    </header>
    <main>

        <nav class="navbar-expand">
            <div class="overlay" id="overlay"></div>
            <div class="menu-toggle" id="menu-toggle">☰</div>

            <ul id="nav-links">
                <li><a href="/index.html">Accueil</a></li>
                <li><a href="/pages/services.html">Nos services</a></li>
                <li><a href="/pages/contact.html">Prendre rendez-vous</a></li>
                <li><a href="/pages/connexion.html">Se connecter</a></li>
                <li><a href="/pages/contact.html">Nous Contacter</a></li>



            </ul>
        </nav>


        <section class="horaire-section">

            <h1>Choisissez un créneau</h1>

            <div class="creneaux-list">

                <button class="creneau-btn">09h00</button>
                <button class="creneau-btn">09h30</button>
                <button class="creneau-btn">10h30</button>
                <button class="creneau-btn">11h30</button>
                <button class="creneau-btn">12h30</button>
                <button class="creneau-btn">14h00</button>
                <button class="creneau-btn">15h30</button>

            </div>

        </section>

    </main>

    <footer>
        <p>Politique de confidentialité - Conditions générales d’utilisation</p>
        <p>&copy;2026 Aurora Hair Salon. Tous droits réservés.</p>
    </footer>

    <script>
        const toggle = document.getElementById("menu-toggle");
        const navLinks = document.getElementById("nav-links");
        const overlay = document.getElementById("overlay");

        toggle.addEventListener("click", () => {
            navLinks.classList.toggle("active");
            overlay.classList.toggle("active");
        });

        overlay.addEventListener("click", () => {
            navLinks.classList.remove("active");
            overlay.classList.remove("active");
        });
    </script>
</body>

</html>
