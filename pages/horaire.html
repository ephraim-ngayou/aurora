<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aurora - Horaire</title>
    <link rel="stylesheet" href="/assets/css/style.css">

</head>

<body>

    <header class="header">
        <img src="/assets/img/logo.png" alt="Aurora Logo" class="logo-right">
    </header>
    <main>


        <nav class="navbar-expand">
            <div class="overlay" id="overlay"></div>
            <div class="menu-toggle" id="menu-toggle">☰</div>
            <div class="close-toggle" id="close-toggle">✖</div>

            <ul id="nav-links">
                <li><a href="/index.html">Accueil</a></li>
                <li><a href="/pages/services.html">Nos services</a></li>
                <li><a href="/pages/contact.html">Prendre rendez-vous</a></li>
                <li><a href="/pages/connexion.html">Se connecter</a></li>
                <li><a href="/pages/contact.html">Nous Contacter</a></li>



            </ul>
        </nav>


        <section class="calendar-grid">

            <div class="row">
                <div class="cell empty"></div>
                <div class="cell day" data-day="Lundi">Lun</div>
                <div class="cell day" data-day="Mardi">Mar</div>
                <div class="cell day" data-day="Mercredi">Mer</div>
                <div class="cell day" data-day="Jeudi">Jeu</div>
                <div class="cell day" data-day="Vendredi">Ven</div>
                <div class="cell day" data-day="Samedi">Sam</div>
            </div>

            <!-- Ligne horaire -->
            <div class="row">
                <div class="cell hour">09h00</div>
                <div class="cell slot" data-day="Lundi" data-hour="09h00"></div>
                <div class="cell slot" data-day="Mardi" data-hour="09h00"></div>
                <div class="cell slot" data-day="Mercredi" data-hour="09h00"></div>
                <div class="cell slot" data-day="Jeudi" data-hour="09h00"></div>
                <div class="cell slot" data-day="Vendredi" data-hour="09h00"></div>
                <div class="cell slot" data-day="Samedi" data-hour="09h00"></div>
            </div>

            <div class="row">
                <div class="cell hour">10h00</div>
                <div class="cell slot" data-day="Lundi" data-hour="10h00"></div>
                <div class="cell slot" data-day="Mardi" data-hour="10h00"></div>
                <div class="cell slot" data-day="Mercredi" data-hour="10h00"></div>
                <div class="cell slot" data-day="Jeudi" data-hour="10h00"></div>
                <div class="cell slot" data-day="Vendredi" data-hour="10h00"></div>
                <div class="cell slot" data-day="Samedi" data-hour="10h00"></div>
            </div>

            <div class="row">
                <div class="cell hour">11h00</div>
                <div class="cell slot" data-day="Lundi" data-hour="11h00"></div>
                <div class="cell slot" data-day="Mardi" data-hour="11h00"></div>
                <div class="cell slot" data-day="Mercredi" data-hour="11h00"></div>
                <div class="cell slot" data-day="Jeudi" data-hour="11h00"></div>
                <div class="cell slot" data-day="Vendredi" data-hour="11h00"></div>
                <div class="cell slot" data-day="Samedi" data-hour="11h00"></div>
            </div>

            <div class="row">
                <div class="cell hour">14h00</div>
                <div class="cell slot" data-day="Lundi" data-hour="14h00"></div>
                <div class="cell slot" data-day="Mardi" data-hour="14h00"></div>
                <div class="cell slot" data-day="Mercredi" data-hour="14h00"></div>
                <div class="cell slot" data-day="Jeudi" data-hour="14h00"></div>
                <div class="cell slot" data-day="Vendredi" data-hour="14h00"></div>
                <div class="cell slot" data-day="Samedi" data-hour="14h00"></div>
            </div>

            <div class="row">
                <div class="cell hour">15h00</div>
                <div class="cell slot" data-day="Lundi" data-hour="15h00"></div>
                <div class="cell slot" data-day="Mardi" data-hour="15h00"></div>
                <div class="cell slot" data-day="Mercredi" data-hour="15h00"></div>
                <div class="cell slot" data-day="Jeudi" data-hour="15h00"></div>
                <div class="cell slot" data-day="Vendredi" data-hour="15h00"></div>
                <div class="cell slot" data-day="Samedi" data-hour="15h00"></div>
            </div>



            <button id="confirm-btn" class="confirm-btn">Confirmer</button>
        </section>


    </main>

    <footer>
        <p>Politique de confidentialité - Conditions générales d’utilisation</p>
        <p>&copy;2026 Aurora Hair Salon. Tous droits réservés.</p>
    </footer>

    <script>
        const toggle = document.getElementById("menu-toggle");
        const closeToggle = document.getElementById("close-toggle");
        const navLinks = document.getElementById("nav-links");
        const overlay = document.getElementById("overlay");

        toggle.addEventListener("click", () => {
            navLinks.classList.add("active");
            overlay.classList.add("active");

            toggle.style.display = "none";       // cacher ☰
            closeToggle.style.display = "block"; // afficher X
        });

        closeToggle.addEventListener("click", () => {
            navLinks.classList.remove("active");
            overlay.classList.remove("active");

            closeToggle.style.display = "none";  // cacher X
            toggle.style.display = "block";      // afficher ☰
        });

        overlay.addEventListener("click", () => {
            navLinks.classList.remove("active");
            overlay.classList.remove("active");

            closeToggle.style.display = "none";
            toggle.style.display = "block";
        });

        let selectedDay = null;
        let selectedHour = null;

        const slots = document.querySelectorAll(".slot");

        slots.forEach(slot => {
            slot.addEventListener("click", () => {
                // reset
                slots.forEach(s => s.classList.remove("selected"));

                // select
                slot.classList.add("selected");

                selectedDay = slot.dataset.day;
                selectedHour = slot.dataset.hour;
            });
        });

        document.getElementById("confirm-btn").addEventListener("click", () => {
            if (!selectedDay || !selectedHour) {
                alert("Veuillez choisir un jour et une heure.");
                return;
            }

            const params = new URLSearchParams(window.location.search);
            const service = params.get("service");

            window.location.href =
                "/pages/confirmation.html?service=" + encodeURIComponent(service) +
                "&day=" + encodeURIComponent(selectedDay) +
                "&hour=" + encodeURIComponent(selectedHour);
        });
    </script>
</body>

</html>
